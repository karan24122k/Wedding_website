<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Films | Capture Stories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; }
        h1 { font-family: 'Playfair Display', serif; }
        
        /* Video Player Styling */
        .video-container {
            position: relative;
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .video-container video {
            display: block;
            width: 100%;
            height: 100%;
            background: #000;
        }
        
        /* Custom controls for better UX */
        .video-container video::-webkit-media-controls {
            display: flex;
        }
        
        .video-container video::-moz-media-controls {
            display: flex;
        }
        
        /* Fullscreen styling */
        video:fullscreen {
            max-width: 100%;
            width: 100%;
            height: 100%;
        }
        
        video:-webkit-full-screen {
            width: 100%;
            height: 100%;
        }
        
        /* Orientation is now managed dynamically via object-contain and max-height */
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center border-b border-white/10 bg-black/80 backdrop-blur-md sticky top-0 z-50">
        <a href="index.html" class="font-bold tracking-tighter uppercase text-sm">← Back</a>
        <span class="text-xs tracking-[0.3em] uppercase opacity-50 font-bold">Cinematography</span>
    </nav>

    <header class="py-24 px-6 text-center">
        <h1 class="text-5xl md:text-7xl mb-4 italic font-light">Motion Pictures</h1>
        <p class="text-orange-500 uppercase tracking-[0.4em] text-[10px]">Documentary & Cinematic Style</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-20 space-y-24">
        <div class="space-y-6">
            <div class="video-container group">
                <div class="absolute top-4 right-4 z-10 flex space-x-2 bg-black/50 p-1 rounded-lg backdrop-blur text-white opacity-0 group-hover:opacity-100 transition duration-300 shadow-xl">
                    <button onclick="setOrientation(this, 'landscape')" class="px-3 py-1 text-[10px] rounded hover:bg-white/20 uppercase tracking-widest"><i class="fas fa-desktop mr-1"></i> Landscape</button>
                    <button onclick="setOrientation(this, 'portrait')" class="px-3 py-1 text-[10px] rounded hover:bg-white/20 uppercase tracking-widest"><i class="fas fa-mobile-alt mr-1"></i> Portrait</button>
                </div>
                <video class="w-full max-h-[80vh] object-contain transition-all duration-500" controls preload="none" playsinline poster="Images/_DSC4554 copy.webp">
                    <source src="Images/REEL.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div class="flex justify-between items-end">
                <div>
                    <h3 class="text-2xl font-serif italic">Aditya & Anjali</h3>
                    <p class="text-xs opacity-50 uppercase tracking-widest">Leela Palace, Bengaluru</p>
                </div>
                <div class="text-[10px] border border-white/20 px-4 py-1 rounded-full uppercase">Trailer</div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="video-container group">
                <div class="absolute top-4 right-4 z-10 flex space-x-2 bg-black/50 p-1 rounded-lg backdrop-blur text-white opacity-0 group-hover:opacity-100 transition duration-300 shadow-xl">
                    <button onclick="setOrientation(this, 'landscape')" class="px-3 py-1 text-[10px] rounded hover:bg-white/20 uppercase tracking-widest"><i class="fas fa-desktop mr-1"></i> Landscape</button>
                    <button onclick="setOrientation(this, 'portrait')" class="px-3 py-1 text-[10px] rounded hover:bg-white/20 uppercase tracking-widest"><i class="fas fa-mobile-alt mr-1"></i> Portrait</button>
                </div>
                <video class="w-full max-h-[80vh] object-contain transition-all duration-500" controls preload="none" playsinline poster="Images/_DSC4572 copy.webp">
                    <source src="Images/REEL.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div>
                <h3 class="text-2xl font-serif italic">The Summer Palace Wedding</h3>
                <p class="text-xs opacity-50 uppercase tracking-widest">Hyderabad | 2024</p>
            </div>
        </div>

        <div class="space-y-6">
            <div class="video-container group">
                <div class="absolute top-4 right-4 z-10 flex space-x-2 bg-black/50 p-1 rounded-lg backdrop-blur text-white opacity-0 group-hover:opacity-100 transition duration-300 shadow-xl">
                    <button onclick="setOrientation(this, 'landscape')" class="px-3 py-1 text-[10px] rounded hover:bg-white/20 uppercase tracking-widest"><i class="fas fa-desktop mr-1"></i> Landscape</button>
                    <button onclick="setOrientation(this, 'portrait')" class="px-3 py-1 text-[10px] rounded hover:bg-white/20 uppercase tracking-widest"><i class="fas fa-mobile-alt mr-1"></i> Portrait</button>
                </div>
                <video class="w-full max-h-[80vh] object-contain transition-all duration-500" controls preload="none" playsinline poster="Images/_DSC4598 copy.webp">
                    <source src="Images/REEL.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div class="flex justify-between items-end">
                <div>
                    <h3 class="text-2xl font-serif italic">Wedding Reel</h3>
                    <p class="text-xs opacity-50 uppercase tracking-widest">Highlights & Moments</p>
                </div>
                <div class="text-[10px] border border-white/20 px-4 py-1 rounded-full uppercase">Reel</div>
            </div>
        </div>
    </main>

    <script>
        function setOrientation(btn, format) {
            const container = btn.closest('.video-container');
            const video = container.querySelector('video');
            
            if (format === 'portrait') {
                container.classList.add('max-w-[400px]', 'mx-auto');
                video.classList.replace('object-contain', 'object-cover');
                video.classList.replace('max-h-[80vh]', 'h-[80vh]');
                
                // If the video was literally rotated sideways in its encoding, you can optionally rotate it
                // video.style.transform = "rotate(90deg) scale(1.77)";
            } else {
                container.classList.remove('max-w-[400px]', 'mx-auto');
                video.classList.replace('object-cover', 'object-contain');
                video.classList.replace('h-[80vh]', 'max-h-[80vh]');
                // video.style.transform = "none";
            }
        }
    </script>
</body>
</html>
